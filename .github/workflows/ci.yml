name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate HTML
        run: npx --yes html-validate "_site/**/*.html"

      - name: Check internal links
        run: npx --yes linkinator _site

      - name: Lighthouse CI
        run: npx --yes @lhci/cli autorun --config=lighthouserc.json
